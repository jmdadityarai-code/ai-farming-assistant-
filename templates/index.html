<!DOCTYPE html>
<html>
<head>
    <title>AI Farming Assistant</title>
</head>
<meta name="google-site-verification" content="w-7aXCsEoPGzszun3FqWIgXEWqdXV83cUqJNuWIr7f0" />
<body>

<h1>🌱 AI Farming Assistant</h1>

<form method="POST">
    <input type="text" name="city" placeholder="Enter city">
    <button type="submit">Check Weather</button>
</form>

{% if weather %}
    <h2>{{ weather.city }}</h2>
    <p>{{ weather.temp }} °C</p>
    <p>{{ weather.description }}</p>
    <p>{{ weather.advice }}</p>
{% endif %}

</body>
</html>
