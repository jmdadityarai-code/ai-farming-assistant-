<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farming AI Chatbot 🌱</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

    body {
        font-family: 'Roboto', sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #89f7fe, #66a6ff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 400px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        animation: fadeIn 1s ease forwards;
    }

    h1 {
        text-align: center;
        color: #fff;
        margin-bottom: 20px;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 20px;
    }

    input[type=text] {
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.3);
        color: #fff;
        font-size: 1em;
        transition: background 0.3s ease;
    }

    input[type=text]:focus {
        background: rgba(255,255,255,0.6);
    }

    button {
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #00c6ff;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.3s ease;
    }

    button:hover {
        transform: scale(1.05);
        background: #0072ff;
    }

    .result, .chatbot-box {
        background: rgba(255,255,255,0.2);
        color: #fff;
        padding: 15px;
        border-radius: 15px;
        margin-top: 10px;
        backdrop-filter: blur(5px);
        transition: transform 0.3s ease;
    }

    .result:hover, .chatbot-box:hover {
        transform: translateY(-3px);
    }

    .chatbot-box {
        background: rgba(0,255,128,0.2);
    }

    @keyframes fadeIn {
        from {opacity:0; transform: translateY(-20px);}
        to {opacity:1; transform: translateY(0);}
    }
</style>
</head>
<body>
<div class="container">
    <h1>Farming AI Chatbot 🌱</h1>

    <form method="POST">
        <input type="text" name="city" placeholder="Apni city likho..." value="{{ city or '' }}">
        <input type="text" name="message" placeholder="Apna message likho...">
        <button type="submit">Send 🚀</button>
    </form>

    {% if weather and advice %}
    <div class="result">
        <strong>{{ weather }}</strong><br>
        Advice: {{ advice }}
    </div>
    {% endif %}

    {% if chat_response %}
    <div class="chatbot-box">
        <strong>Chatbot:</strong> {{ chat_response }}
    </div>
    {% endif %}
</div>
</body>
</html>
