<!DOCTYPE html>
<html>
<head>
    <title>Weather AI</title>
</head>
<body>

<h1>🌤️ Weather App</h1>

<form method="POST">
    <input type="text" name="city" placeholder="Enter city" required>
    <button type="submit">Check</button>
</form>

{% if weather %}
    <h2>{{ weather.city }}</h2>
    <p>{{ weather.temp }} °C</p>
    <p>{{ weather.description }}</p>
    <p>{{ weather.advice }}</p>
{% endif %}

</body>
</html>
