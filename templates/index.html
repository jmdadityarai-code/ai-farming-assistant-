</head>

<body>

    <h1>🌱 AI Farming Assistant</h1>

    <form method="POST">
        <input type="text" name="city" placeholder="Enter city" required>
        <button type="submit">Check Weather</button>
    </form>

    {% if weather %}
        <h2>{{ weather.city }}</h2>
        <p>{{ weather.temp }}</p>
        <p>{{ weather.description }}</p>
        <p>{{ weather.advice }}</p>
    {% endif %}

</body>
